.comp-table tbody tr{border-top:1px solid var(--border)}

.comp-table tbody td{padding:.8rem 1rem;color:var(--text);vertical-align:top}
.comp-table tbody td:not(:first-child){text-align:center;color:var(--muted)}

.btn-planes-art:hover{background:rgba(255,255,255,.15);color:#fff}

.mas-art-inner{max-width:1180px;margin:0 auto}
.mas-art-title{font-family:var(--serif);font-size:1.3rem;color:var(--navy);margin-bottom:1.5rem}
.mas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem}
.mas-card{border:1px solid var(--border);border-radius:9px;overflow:hidden;text-decoration:none;transition:transform .2s,border-color .2s;display:block}
.mas-card:hover{transform:translateY(-3px);border-color:var(--navy)}
.mas-thumb{height:140px;overflow:hidden}
.mas-thumb img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform .35s var(--ease)}
.mas-card:hover .mas-thumb img{transform:scale(1.04)}
.mas-body{padding:1rem}
.mas-tag{font-size:.62rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--mid);margin-bottom:.4rem}
.mas-title{font-family:var(--serif);font-size:.95rem;color:var(--navy);line-height:1.3}

/* Footer */
footer{background:var(--deep);padding:2rem;text-align:center}
footer p{font-size:.76rem;color:rgba(255,255,255,.3);line-height:1.8}
footer a{color:rgba(255,184,0,.7);text-decoration:none}

/* Animación entrada */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.art-hero-content,.art-wrap{animation:fadeUp .5s var(--ease) forwards}

/* Loader / 404 */
.art-loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:1rem}
.art-loading p{color:var(--muted);font-size:.9rem}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
